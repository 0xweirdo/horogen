name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: # กดรันเองได้ — gitleaks จะสแกน history ทั้งหมด

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4 # อ่าน version จาก packageManager ใน package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo lint typecheck test

      - run: pnpm format:check

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # docker-build: จะเพิ่มเมื่อ Dockerfile แรกเข้ามา
  #   - workers/encoder  → Phase 5
  #   - ai/worker        → Phase A2 (CI แยกฝั่ง Python: ruff + pytest)
  # prisma migrate diff → Phase 1 (packages/db)
